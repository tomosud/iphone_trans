<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Moonshine ASR</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .asr-shell {
      width: min(720px, 100%);
      min-height: var(--app-height);
      margin: 0 auto;
      display: grid;
      gap: var(--gap);
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 12px calc(env(safe-area-inset-bottom, 0px) + 12px);
    }
    .status-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #525b67;
    }
    .status-dot.active { background: #10b981; }
    .status-dot.error { background: #ef4444; }
    .record-button {
      min-width: 120px;
      height: 44px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #0c8f64;
      color: white;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .record-button.active { background: #dc2626; }
    .meta-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta-label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .model-path {
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 4px 8px;
      background: rgba(20, 22, 25, 0.98);
    }
  </style>
</head>
<body>
  <main class="asr-shell">
    <section class="input-panel">
      <div class="status-row">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Moonshine ready</span>
      </div>
      <div class="input-row" style="grid-template-columns:auto auto auto; justify-content:start;">
        <button id="recordBtn" class="record-button" type="button">🎙️ Start</button>
        <button id="sendBtn" class="clear-button" type="button">送信</button>
        <button id="clearBtn" class="clear-button" type="button">Clear</button>
      </div>
      <div class="meta-row" style="margin-top:10px;">
        <span class="meta-label">model</span>
        <span class="model-path">model/tiny</span>
      </div>
    </section>

    <section class="display-panel">
      <div class="display-box">
        <div id="finalText" class="final-text" translate="yes"></div>
      </div>
    </section>

    <section class="nav-panel" translate="no">
      <div style="margin-bottom:8px;">
        <a class="nav-link-button" href="index.html">← Home</a>
      </div>
      <a class="nav-link-button" href="saved.html">Open saved texts</a>
    </section>
  </main>

  <script src="storage.js"></script>
  <script type="module">
    import * as Moonshine from 'https://cdn.jsdelivr.net/npm/@moonshine-ai/moonshine-js@latest/dist/moonshine.min.js';

    const storageApi = window.TransStorage;
    const finalText = document.getElementById('finalText');
    const recordBtn = document.getElementById('recordBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');

    const MODEL_PATH = 'model/tiny';
    let liveText = '';
    let committedText = '';
    let isRecording = false;

    function renderText() {
      finalText.textContent = `${committedText}${liveText}`.trim();
    }

    function setStatus(message, state = 'idle') {
      statusText.textContent = message;
      statusDot.classList.toggle('active', state === 'active');
      statusDot.classList.toggle('error', state === 'error');
    }

    const transcriber = new Moonshine.MicrophoneTranscriber(
      MODEL_PATH,
      {
        onTranscriptionCommitted(text) {
          committedText = `${committedText} ${text}`.trim();
          liveText = '';
          renderText();
          storageApi?.saveLatestText(committedText);
        },
        onTranscriptionUpdated(text) {
          liveText = text;
          renderText();
        },
      },
      false,
    );

    recordBtn.addEventListener('click', async () => {
      try {
        if (!isRecording) {
          await transcriber.start();
          isRecording = true;
          recordBtn.textContent = '⏹ Stop';
          recordBtn.classList.add('active');
          setStatus('Listening…', 'active');
          return;
        }

        await transcriber.stop();
        isRecording = false;
        recordBtn.textContent = '🎙️ Start';
        recordBtn.classList.remove('active');
        setStatus('Stopped');
      } catch (error) {
        console.error(error);
        setStatus(`Error: ${error.message || 'failed to start'}`, 'error');
      }
    });

    clearBtn.addEventListener('click', async () => {
      const text = `${committedText}${liveText}`.trim();
      if (text) {
        await storageApi?.archiveText(text, 'clear');
      }
      committedText = '';
      liveText = '';
      renderText();
      await storageApi?.saveLatestText('');
    });

    sendBtn.addEventListener('click', async () => {
      const text = `${committedText}${liveText}`.trim();
      if (!text) return;
      await storageApi?.archiveText(text, 'send');
      committedText = '';
      liveText = '';
      renderText();
      await storageApi?.saveLatestText('');
    });

    async function restoreLatest() {
      try {
        const latest = await storageApi?.getLatestText();
        if (latest?.body) {
          committedText = latest.body;
          renderText();
        }
      } catch (error) {
        console.warn('failed to restore latest text', error);
      }
    }

    restoreLatest();
  </script>
</body>
</html>

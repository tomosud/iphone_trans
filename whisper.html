<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Light Speech Input</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .asr-shell {
      width: min(720px, 100%);
      min-height: var(--app-height);
      margin: 0 auto;
      display: grid;
      gap: var(--gap);
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 12px calc(env(safe-area-inset-bottom, 0px) + 12px);
    }
    .status-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #525b67;
    }
    .status-dot.active { background: #10b981; }
    .status-dot.error { background: #ef4444; }
    .record-button {
      min-width: 120px;
      height: 44px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #0c8f64;
      color: white;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .record-button.active { background: #dc2626; }
    .meta-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .meta-label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .model-path {
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 4px 8px;
      background: rgba(20, 22, 25, 0.98);
    }
  </style>
</head>
<body>
  <main class="asr-shell">
    <section class="input-panel">
      <div class="status-row">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Speech API ready</span>
      </div>
      <div class="input-row" style="grid-template-columns:auto auto auto; justify-content:start;">
        <button id="recordBtn" class="record-button" type="button">🎙️ Start</button>
        <button id="sendBtn" class="clear-button" type="button">送信</button>
        <button id="clearBtn" class="clear-button" type="button">Clear</button>
      </div>
      <div class="meta-row" style="margin-top:10px;">
        <span class="meta-label">engine</span>
        <span class="model-path">Web Speech API (lightweight)</span>
      </div>
      <div class="meta-row" style="margin-top:10px; align-items:flex-start;">
        <span class="meta-label">log</span>
        <pre id="logBox" class="model-path" style="white-space:pre-wrap; line-height:1.35; min-height:80px; max-height:180px; overflow:auto; margin:0; width:min(100%, 560px);"></pre>
      </div>
    </section>

    <section class="display-panel">
      <div class="display-box">
        <div id="finalText" class="final-text" translate="yes"></div>
      </div>
    </section>

    <section class="nav-panel" translate="no">
      <div style="margin-bottom:8px;">
        <a class="nav-link-button" href="index.html">← Home</a>
      </div>
      <a class="nav-link-button" href="saved.html">Open saved texts</a>
    </section>
  </main>

  <script src="storage.js"></script>
  <script>
    const storageApi = window.TransStorage;
    const finalText = document.getElementById('finalText');
    const recordBtn = document.getElementById('recordBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const logBox = document.getElementById('logBox');

    let liveText = '';
    let committedText = '';
    let isRecording = false;
    let stopRequested = false;
    let recognition = null;

    function log(message, detail) {
      const now = new Date();
      const ts = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
      const line = detail ? `[${ts}] ${message} ${detail}` : `[${ts}] ${message}`;
      logBox.textContent = `${line}\n${logBox.textContent}`.slice(0, 2500);
      console.log('[speech]', message, detail || '');
    }

    function renderText() {
      finalText.textContent = `${committedText}${liveText}`.trim();
    }

    function setStatus(message, state = 'idle') {
      statusText.textContent = message;
      statusDot.classList.toggle('active', state === 'active');
      statusDot.classList.toggle('error', state === 'error');
      log('status:', message);
    }

    function setupRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        setStatus('SpeechRecognition is not supported on this browser', 'error');
        recordBtn.disabled = true;
        log('error:', 'SpeechRecognition unavailable');
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        setStatus('Listening…', 'active');
        log('recognition', 'onstart');
      };

      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            committedText = `${committedText} ${transcript}`.trim();
            log('final:', transcript.trim());
          } else {
            interim += transcript;
          }
        }

        liveText = interim.trim();
        renderText();
        if (committedText) {
          void storageApi?.saveLatestText(committedText);
        }
      };

      recognition.onerror = (event) => {
        log('error:', `${event.error || 'unknown'} (${event.message || 'no message'})`);
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
          setStatus('Mic permission denied', 'error');
        } else {
          setStatus(`Error: ${event.error || 'recognition failed'}`, 'error');
        }
      };

      recognition.onend = () => {
        log('recognition', 'onend');
        if (isRecording && !stopRequested) {
          log('recognition', 'auto restart');
          recognition.start();
          return;
        }

        isRecording = false;
        stopRequested = false;
        recordBtn.textContent = '🎙️ Start';
        recordBtn.classList.remove('active');
        if (!statusDot.classList.contains('error')) {
          setStatus('Stopped');
        }
      };
    }

    recordBtn.addEventListener('click', async () => {
      try {
        if (!isRecording) {
          if (!recognition) {
            setupRecognition();
          }
          if (!recognition) {
            return;
          }

          stopRequested = false;
          recognition.start();
          isRecording = true;
          recordBtn.textContent = '⏹ Stop';
          recordBtn.classList.add('active');
          return;
        }

        stopRequested = true;
        recognition.stop();
      } catch (error) {
        console.error(error);
        log('exception:', error.message || String(error));
        setStatus(`Error: ${error.message || 'failed to start'}`, 'error');
      }
    });

    clearBtn.addEventListener('click', async () => {
      const text = `${committedText}${liveText}`.trim();
      if (text) {
        await storageApi?.archiveText(text, 'clear');
      }
      committedText = '';
      liveText = '';
      renderText();
      await storageApi?.saveLatestText('');
    });

    sendBtn.addEventListener('click', async () => {
      const text = `${committedText}${liveText}`.trim();
      if (!text) return;
      await storageApi?.archiveText(text, 'send');
      committedText = '';
      liveText = '';
      renderText();
      await storageApi?.saveLatestText('');
    });

    async function restoreLatest() {
      try {
        const latest = await storageApi?.getLatestText();
        if (latest?.body) {
          committedText = latest.body;
          renderText();
        }
      } catch (error) {
        console.warn('failed to restore latest text', error);
        log('restore warning:', error.message || String(error));
      }
    }

    setupRecognition();
    restoreLatest();
  </script>
</body>
</html>

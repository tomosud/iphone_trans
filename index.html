<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="iPhoneの音声入力とブラウザ翻訳の挙動を確認するためのプロトタイプ">
  <title>Live Transcript Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="input-panel">
      <div class="input-row">
        <label class="sr-only" for="sourceText">入力テキスト</label>
        <input
          id="sourceText"
          class="input-box"
          type="text"
          lang="ja"
          placeholder="ここをタップして音声入力"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button id="clearButton" class="clear-button" type="button" aria-label="入力内容を消去">Clear</button>
      </div>
    </section>

    <section class="display-panel">
      <div class="display-box">
        <div id="finalText" class="final-text" lang="ja" translate="yes"></div>
      </div>
    </section>

    <section class="metrics-panel" translate="no" aria-label="テキスト量メーター">
      <div class="metric">
        <div class="metric-head">
          <span class="metric-label">Stored</span>
          <span id="storedCount" class="metric-value">0 chars</span>
        </div>
        <div class="meter-track">
          <div id="storedBar" class="meter-fill meter-fill-stored"></div>
        </div>
      </div>
      <div class="metric">
        <div class="metric-head">
          <span class="metric-label">Current</span>
          <span id="liveCount" class="metric-value">0 chars</span>
        </div>
        <div class="meter-track">
          <div id="liveBar" class="meter-fill meter-fill-live"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="iPhoneの音声入力とブラウザ翻訳の挙動を確認するためのプロトタイプ">
  <title>Live Transcript Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="input-panel">
      <label class="sr-only" for="sourceText">入力テキスト</label>
      <textarea
        id="sourceText"
        class="input-box"
        lang="ja"
        placeholder="ここをタップして音声入力"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        rows="1"
      ></textarea>
    </section>

    <section class="display-panel">
      <div id="displayText" class="display-box" lang="ja" translate="yes">
        ここにリアルタイム表示されます。
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

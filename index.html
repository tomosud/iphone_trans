<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Prototype for testing iPhone dictation with browser translation.">
  <title>Live Transcript Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="input-panel">
      <div class="input-row">
        <label class="sr-only" for="sourceText">Input text</label>
        <input
          id="sourceText"
          class="input-box"
          type="text"
          lang="en"
          placeholder="Speak to enter text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button id="clearButton" class="clear-button" type="button" aria-label="Clear input">Clear</button>
      </div>
    </section>

    <section class="display-panel">
      <div class="display-box">
        <div id="finalText" class="final-text" lang="en" translate="yes"></div>
      </div>
    </section>

    <section class="nav-panel" translate="no">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
        <a class="nav-link-button" href="voice.html">🎤 Voice input</a>
        <a id="savedTextsLink" class="nav-link-button" href="saved.html">Open saved texts</a>
      </div>
      <div style="margin-bottom:8px;">
        <a class="nav-link-button" href="whisper.html">🤖 Whisper (local ASR)</a>
      </div>
    </section>
  </main>

  <script src="storage.js"></script>
  <script src="script.js"></script>
</body>
</html>

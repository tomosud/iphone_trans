<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="保存したテキストを一覧と詳細で確認する画面">
  <title>Saved Texts</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="saved-body">
  <main class="saved-shell">
    <header class="saved-header">
      <a class="saved-back" href="index.html">Back</a>
      <div>
        <p class="saved-eyebrow">Saved</p>
        <h1 class="saved-title">Saved Texts</h1>
      </div>
    </header>

    <section id="listView" class="saved-panel">
      <div class="saved-toolbar">
        <button id="copyAllButton" class="detail-button" type="button">Copy all texts</button>
      </div>
      <p id="listStatus" class="detail-status" aria-live="polite"></p>
      <div id="latestSection" class="saved-group" hidden>
        <div class="saved-group-head">
          <h2>Latest</h2>
        </div>
        <div id="latestCardContainer"></div>
      </div>

      <div class="saved-group">
        <div class="saved-group-head">
          <h2>History</h2>
        </div>
        <div id="historyList" class="saved-list"></div>
      </div>

      <p id="emptyState" class="saved-empty" hidden>保存されたテキストはまだありません。</p>
    </section>

    <section id="detailView" class="saved-panel" hidden>
      <div class="detail-head">
        <a class="saved-back saved-back-inline" href="saved.html">Back to list</a>
        <h2 id="detailTitle" class="detail-title"></h2>
        <p id="detailDate" class="detail-date"></p>
      </div>
      <div class="detail-actions">
        <button class="detail-button" type="button" data-action="copy">Copy</button>
        <button class="detail-button detail-button-danger" type="button" data-action="delete">Delete</button>
      </div>
      <article id="detailBody" class="detail-body"></article>
      <div class="detail-actions">
        <button class="detail-button" type="button" data-action="copy">Copy</button>
        <button class="detail-button detail-button-danger" type="button" data-action="delete">Delete</button>
      </div>
      <p id="detailStatus" class="detail-status" aria-live="polite"></p>
    </section>
  </main>

  <script src="storage.js"></script>
  <script src="saved.js"></script>
</body>
</html>

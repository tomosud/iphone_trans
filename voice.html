<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Voice input using Web Speech API for iOS Safari.">
  <title>Voice Input</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .voice-shell {
      width: min(720px, 100%);
      min-height: var(--app-height);
      height: auto;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: var(--gap);
      padding:
        calc(env(safe-area-inset-top, 0px) + 12px)
        12px
        calc(env(safe-area-inset-bottom, 0px) + 12px);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .status-dot.listening {
      background: #e05252;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-label {
      flex: 1;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status-label.listening {
      color: #e88;
    }

    .lang-select {
      height: 32px;
      padding: 0 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(24, 27, 31, 0.98);
      color: var(--ink);
      font: inherit;
      font-size: 0.85rem;
      appearance: none;
      -webkit-appearance: none;
    }

    /* Transcript display */
    .transcript-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .transcript-box {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .transcript-final {
      color: var(--ink);
      font-size: clamp(1.1rem, 3.8vw, 1.45rem);
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .transcript-interim {
      color: var(--muted);
      font-size: clamp(1.1rem, 3.8vw, 1.45rem);
      line-height: 1.8;
      font-style: italic;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .transcript-placeholder {
      color: var(--muted);
      font-size: clamp(1.1rem, 3.8vw, 1.45rem);
      line-height: 1.8;
    }

    /* Controls */
    .controls-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .mic-button {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.12);
      background: rgba(30, 33, 38, 0.98);
      color: var(--ink);
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      appearance: none;
      -webkit-appearance: none;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .mic-button:active {
      transform: scale(0.93);
    }

    .mic-button.listening {
      background: rgba(180, 40, 40, 0.85);
      border-color: rgba(240, 80, 80, 0.45);
      animation: pulse-ring 1.4s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(200, 50, 50, 0.45); }
      70% { box-shadow: 0 0 0 18px rgba(200, 50, 50, 0); }
      100% { box-shadow: 0 0 0 0 rgba(200, 50, 50, 0); }
    }

    .mic-hint {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .voice-clear-button {
      flex: 1;
      height: 44px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(20, 22, 25, 0.98);
      color: var(--ink);
      font: inherit;
      font-size: 0.95rem;
      touch-action: manipulation;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    /* Nav */
    .nav-panel {
      margin-top: 0;
    }

    .nav-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* Not supported warning */
    .not-supported {
      display: none;
      padding: 16px;
      border: 1px solid rgba(255, 160, 80, 0.3);
      border-radius: var(--radius);
      background: rgba(80, 50, 10, 0.4);
      color: #f1c97a;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 640px) {
      .voice-shell {
        padding:
          calc(env(safe-area-inset-top, 0px) + 8px)
          8px
          calc(env(safe-area-inset-bottom, 0px) + 8px);
        gap: 8px;
      }

      .controls-panel {
        padding: 14px;
      }

      .mic-button {
        width: 72px;
        height: 72px;
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <main class="voice-shell">

    <!-- Status -->
    <div class="status-bar">
      <span id="statusDot" class="status-dot" aria-hidden="true"></span>
      <span id="statusLabel" class="status-label">Tap mic to start</span>
      <select id="langSelect" class="lang-select" aria-label="Language">
        <option value="en-US">English</option>
        <option value="ja-JP">日本語</option>
        <option value="zh-CN">中文</option>
        <option value="ko-KR">한국어</option>
        <option value="fr-FR">Français</option>
        <option value="es-ES">Español</option>
        <option value="de-DE">Deutsch</option>
      </select>
    </div>

    <!-- Transcript -->
    <div class="transcript-panel" aria-live="polite">
      <div class="transcript-box">
        <div id="transcriptFinal" class="transcript-final"></div>
        <span id="transcriptInterim" class="transcript-interim"></span>
        <div id="transcriptPlaceholder" class="transcript-placeholder">
          Voice transcript will appear here.
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-panel">
      <div id="notSupported" class="not-supported">
        Web Speech API is not available in this browser.<br>
        Try Safari on iOS 14.5+ or Chrome on Android.
      </div>
      <button id="micButton" class="mic-button" type="button" aria-label="Start recording" aria-pressed="false">
        🎤
      </button>
      <div class="mic-hint" id="micHint">Tap to start voice input</div>
      <div class="controls-row">
        <button id="clearButton" class="voice-clear-button" type="button">Clear</button>
      </div>
    </div>

    <!-- Nav -->
    <nav class="nav-panel" translate="no">
      <div class="nav-row">
        <a class="nav-link-button" href="index.html">← Keyboard input</a>
        <a id="savedTextsLink" class="nav-link-button" href="saved.html">Saved texts</a>
      </div>
    </nav>

  </main>

  <script src="storage.js"></script>
  <script>
    const storageApi = window.TransStorage;
    const micButton = document.getElementById("micButton");
    const clearButton = document.getElementById("clearButton");
    const statusDot = document.getElementById("statusDot");
    const statusLabel = document.getElementById("statusLabel");
    const transcriptFinal = document.getElementById("transcriptFinal");
    const transcriptInterim = document.getElementById("transcriptInterim");
    const transcriptPlaceholder = document.getElementById("transcriptPlaceholder");
    const micHint = document.getElementById("micHint");
    const langSelect = document.getElementById("langSelect");
    const savedTextsLink = document.getElementById("savedTextsLink");
    const notSupported = document.getElementById("notSupported");

    // --- State ---
    let finalText = "";
    let isListening = false;
    let recognition = null;
    let shouldRestart = false;
    let latestSaveTimer = null;
    const latestSaveDelayMs = 400;

    // --- Web Speech API setup ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      notSupported.style.display = "block";
      micButton.disabled = true;
      micButton.style.opacity = "0.4";
    }

    function buildRecognition() {
      const rec = new SpeechRecognition();
      rec.continuous = false;      // iOS Safari ignores true; we auto-restart instead
      rec.interimResults = true;
      rec.maxAlternatives = 1;
      rec.lang = langSelect.value;

      rec.onstart = () => {
        setListeningState(true);
      };

      rec.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            appendFinalText(transcript);
          } else {
            interim += transcript;
          }
        }
        transcriptInterim.textContent = interim;
        updatePlaceholder();
      };

      rec.onerror = (event) => {
        // "no-speech" is normal on iOS; restart silently
        if (event.error === "no-speech") {
          if (shouldRestart) {
            restartSoon();
          }
          return;
        }
        // not-allowed: microphone permission denied
        if (event.error === "not-allowed") {
          shouldRestart = false;
          setListeningState(false);
          statusLabel.textContent = "Mic permission denied";
          return;
        }
        // Other errors: stop
        shouldRestart = false;
        setListeningState(false);
        statusLabel.textContent = "Error: " + event.error;
      };

      rec.onend = () => {
        transcriptInterim.textContent = "";
        if (shouldRestart) {
          restartSoon();
        } else {
          setListeningState(false);
        }
      };

      return rec;
    }

    function restartSoon() {
      // Short delay before restart to avoid rapid-fire on iOS
      setTimeout(() => {
        if (shouldRestart) {
          try {
            recognition = buildRecognition();
            recognition.start();
          } catch (e) {
            // ignore abort errors
          }
        }
      }, 150);
    }

    function appendFinalText(transcript) {
      const trimmed = transcript.trim();
      if (!trimmed) return;

      if (finalText && !finalText.endsWith("\n")) {
        finalText += " " + trimmed;
      } else {
        finalText += trimmed;
      }

      renderFinal();
      scheduleLatestSave(finalText);
    }

    function renderFinal() {
      transcriptFinal.textContent = finalText;
      updatePlaceholder();
      // Scroll to bottom to show latest text
      transcriptFinal.scrollIntoView({ block: "end", behavior: "smooth" });
    }

    function updatePlaceholder() {
      const hasContent = finalText || transcriptInterim.textContent;
      transcriptPlaceholder.style.display = hasContent ? "none" : "block";
    }

    function setListeningState(listening) {
      isListening = listening;
      micButton.classList.toggle("listening", listening);
      statusDot.classList.toggle("listening", listening);
      micButton.setAttribute("aria-pressed", String(listening));
      micButton.setAttribute("aria-label", listening ? "Stop recording" : "Start recording");

      if (listening) {
        statusLabel.textContent = "Listening…";
        statusLabel.className = "status-label listening";
        micHint.textContent = "Tap to stop";
      } else {
        statusLabel.textContent = finalText ? "Paused — tap to continue" : "Tap mic to start";
        statusLabel.className = "status-label";
        micHint.textContent = finalText ? "Tap to continue" : "Tap to start voice input";
      }
    }

    function startListening() {
      if (!SpeechRecognition) return;
      shouldRestart = true;
      recognition = buildRecognition();
      try {
        recognition.start();
      } catch (e) {
        // already started
      }
    }

    function stopListening() {
      shouldRestart = false;
      if (recognition) {
        try {
          recognition.stop();
        } catch (e) {
          // ignore
        }
      }
      setListeningState(false);
    }

    function scheduleLatestSave(text) {
      clearTimeout(latestSaveTimer);
      if (!text.trim()) return;
      latestSaveTimer = setTimeout(() => {
        void storageApi.saveLatestText(text);
      }, latestSaveDelayMs);
    }

    async function clearAll() {
      stopListening();
      if (finalText.trim()) {
        clearTimeout(latestSaveTimer);
        await Promise.all([
          storageApi.saveLatestText(finalText),
          storageApi.archiveText(finalText, "clear"),
        ]);
      }
      finalText = "";
      transcriptFinal.textContent = "";
      transcriptInterim.textContent = "";
      updatePlaceholder();
      setListeningState(false);
    }

    async function openSavedTexts(event) {
      event.preventDefault();
      if (finalText.trim()) {
        clearTimeout(latestSaveTimer);
        await Promise.all([
          storageApi.saveLatestText(finalText),
          storageApi.archiveText(finalText, "clear"),
        ]);
      }
      window.location.href = savedTextsLink.href;
    }

    // --- Events ---
    micButton.addEventListener("click", () => {
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });

    clearButton.addEventListener("click", () => {
      void clearAll();
    });

    savedTextsLink.addEventListener("click", (event) => {
      void openSavedTexts(event);
    });

    langSelect.addEventListener("change", () => {
      if (isListening) {
        // Restart with new language
        shouldRestart = true;
        if (recognition) {
          try { recognition.stop(); } catch (e) { /* ignore */ }
        }
      }
    });

    // --- Viewport ---
    function updateViewportMetrics() {
      const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const nextAppHeight = Math.max(320, Math.round(viewportHeight));
      document.documentElement.style.setProperty("--app-height", `${nextAppHeight}px`);
    }

    window.addEventListener("resize", updateViewportMetrics);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateViewportMetrics);
    }
    updateViewportMetrics();
    updatePlaceholder();
  </script>
</body>
</html>

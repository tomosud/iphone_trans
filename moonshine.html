<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Moonshine ASR (Lite)</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .asr-shell {
      width: min(760px, 100%);
      min-height: var(--app-height);
      margin: 0 auto;
      display: grid;
      gap: var(--gap);
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 12px calc(env(safe-area-inset-bottom, 0px) + 12px);
    }
    .status-row, .meta-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .status-row { margin-bottom: 10px; color: var(--muted); font-size: 0.92rem; }
    .status-dot { width:10px; height:10px; border-radius:999px; background:#525b67; }
    .status-dot.active { background:#10b981; }
    .status-dot.error { background:#ef4444; }
    .record-button { min-width:120px; height:44px; padding:0 14px; border-radius:16px; border:1px solid rgba(255,255,255,.08); background:#0c8f64; color:#fff; font:inherit; font-weight:600; cursor:pointer; }
    .record-button.active { background:#dc2626; }
    .meta-label { color:var(--muted); font-size:.8rem; }
    .model-path { color:var(--ink); font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.78rem; border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:4px 8px; background:rgba(20,22,25,.98); }
  </style>
</head>
<body>
  <main class="asr-shell">
    <section class="input-panel">
      <div class="status-row">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Moonshine 初期化待ち…</span>
      </div>

      <div class="input-row" style="grid-template-columns:auto auto auto; justify-content:start;">
        <button id="recordBtn" class="record-button" type="button">🎙️ Start</button>
        <button id="sendBtn" class="clear-button" type="button">送信</button>
        <button id="clearBtn" class="clear-button" type="button">Clear</button>
      </div>

      <div class="meta-row" style="margin-top:10px; align-items:flex-start;">
        <span class="meta-label">engine</span>
        <span id="engineText" class="model-path">Moonshine JS (CDN auto-detect)</span>
      </div>
    </section>

    <section class="display-panel">
      <div class="display-box">
        <div id="finalText" class="final-text" translate="yes"></div>
      </div>
    </section>

    <section class="nav-panel" translate="no">
      <div style="margin-bottom:8px;"><a class="nav-link-button" href="index.html">← Home</a></div>
      <a class="nav-link-button" href="saved.html">Open saved texts</a>
    </section>

    <section class="input-panel">
      <div class="meta-row" style="align-items:flex-start;">
        <span class="meta-label">log</span>
        <pre id="logBox" class="model-path" style="white-space:pre-wrap; line-height:1.35; min-height:88px; max-height:220px; overflow:auto; margin:0; width:min(100%, 560px);"></pre>
      </div>
    </section>
  </main>

  <script src="storage.js"></script>
  <script type="module">
    import * as Moonshine from 'https://cdn.jsdelivr.net/npm/@moonshine-ai/moonshine-js@latest/dist/moonshine.min.js';

    const storageApi = window.TransStorage;
    const finalText = document.getElementById('finalText');
    const recordBtn = document.getElementById('recordBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const logBox = document.getElementById('logBox');
    const engineText = document.getElementById('engineText');

    let transcriber = null;
    let started = false;
    let liveText = '';
    let committedText = '';

    function normalizeText(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function renderText() {
      finalText.textContent = normalizeText(`${committedText} ${liveText}`);
    }

    function log(...args) {
      const now = new Date();
      const ts = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
      const line = args.map((v) => (typeof v === 'string' ? v : JSON.stringify(v))).join(' ');
      logBox.textContent = `[${ts}] ${line}\n${logBox.textContent}`.slice(0, 3600);
      console.log('[moonshine]', line);
    }

    function setStatus(message, state = 'idle') {
      statusText.textContent = message;
      statusDot.classList.toggle('active', state === 'active');
      statusDot.classList.toggle('error', state === 'error');
    }

    function setRecordingUiState(active) {
      recordBtn.textContent = active ? '⏹ Stop' : '🎙️ Start';
      recordBtn.classList.toggle('active', active);
    }

    async function ensureTranscriber() {
      if (transcriber) {
        return;
      }

      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('getUserMedia unavailable');
      }

      const MicrophoneTranscriber = Moonshine?.MicrophoneTranscriber;
      if (typeof MicrophoneTranscriber !== 'function') {
        throw new Error('MicrophoneTranscriber unavailable');
      }

      log('creating transcriber...');

      transcriber = new MicrophoneTranscriber(
        'model/tiny',
        {
          onPermissionsRequested() {
            log('permissions requested');
            setStatus('マイク権限を要求中…');
          },
          onModelLoadStarted() {
            log('model load started');
            setStatus('モデルをロード中…');
          },
          onModelLoaded() {
            log('model loaded');
            setStatus('モデル読み込み完了');
          },
          onTranscribeStarted() {
            log('transcribe started');
            setStatus('録音中…', 'active');
          },
          onTranscribeStopped() {
            log('transcribe stopped');
            started = false;
            setRecordingUiState(false);
            setStatus('停止しました');
          },
          onTranscriptionUpdated(text) {
            liveText = normalizeText(text);
            renderText();
            log('update:', liveText || '');
          },
          onTranscriptionCommitted(text) {
            const normalized = normalizeText(text);
            if (!normalized) {
              return;
            }
            committedText = normalizeText(`${committedText} ${normalized}`);
            liveText = '';
            renderText();
            void storageApi?.saveLatestText(committedText);
            log('commit:', normalized);
          },
          onError(error) {
            const message = error?.message || String(error);
            log('error:', message);
            started = false;
            setRecordingUiState(false);
            setStatus(`Error: ${message}`, 'error');
          }
        },
        true
      );

      engineText.textContent = 'Moonshine JS @ jsDelivr (model/tiny, VAD=true)';
    }

    async function initAndStart() {
      try {
        log('Start clicked');
        await ensureTranscriber();
        await transcriber.start();
        started = true;
        setRecordingUiState(true);
        setStatus('録音中…', 'active');
        log('start ok');
      } catch (error) {
        const message = error?.message || String(error);
        log('fatal:', message, error?.stack || '');
        setStatus(`Error: ${message}`, 'error');
      }
    }

    async function stopNow() {
      try {
        if (!transcriber || !started) {
          return;
        }
        setStatus('停止処理中…');
        await transcriber.stop();
        started = false;
        setRecordingUiState(false);
        log('stopped');
      } catch (error) {
        const message = error?.message || String(error);
        log('stop error:', message);
        setStatus(`Error: ${message}`, 'error');
      }
    }

    recordBtn.addEventListener('click', async () => {
      if (started) {
        await stopNow();
      } else {
        await initAndStart();
      }
    });

    clearBtn.addEventListener('click', async () => {
      const text = normalizeText(`${committedText} ${liveText}`);
      if (text) {
        await storageApi?.archiveText(text, 'clear');
      }
      committedText = '';
      liveText = '';
      renderText();
      await storageApi?.saveLatestText('');
      log('clear', 'text cleared');
    });

    sendBtn.addEventListener('click', async () => {
      const text = normalizeText(`${committedText} ${liveText}`);
      if (!text) {
        return;
      }
      await storageApi?.archiveText(text, 'send');
      committedText = '';
      liveText = '';
      renderText();
      await storageApi?.saveLatestText('');
      log('send', 'archived and reset');
    });

    async function restoreLatest() {
      try {
        const latest = await storageApi?.getLatestText();
        if (latest?.body) {
          committedText = normalizeText(latest.body);
          renderText();
          log('restore', 'latest text restored');
        }
      } catch (error) {
        log('restore warning', error?.message || String(error));
      }
    }

    restoreLatest();
    setStatus('Ready (press Start to init Moonshine)');
  </script>
</body>
</html>
